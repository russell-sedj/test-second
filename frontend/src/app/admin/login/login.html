<!-- Page de connexion admin — plein écran, pas de header/footer public -->
<div
  class="min-h-screen bg-gradient-to-br from-blue-950 to-blue-800 flex items-center justify-center p-4"
>
  <div class="w-full max-w-sm">
    <!-- Logo + titre -->
    <div class="text-center mb-8">
      <img
        src="assets/images/fibem_logo.jpg"
        alt="Logo Mairie de Mbaling"
        class="h-16 w-auto mx-auto rounded-xl mb-4"
      />
      <h1 class="text-white text-2xl font-bold">Mairie de Mbaling</h1>
      <p class="text-blue-300 text-sm mt-1">Administration — Connexion</p>
    </div>

    <!-- Carte formulaire -->
    <div class="bg-white rounded-2xl shadow-2xl p-8">
      <h2 class="text-gray-900 text-xl font-semibold mb-6">Se connecter</h2>

      @if (error) {
        <div class="mb-4 p-3 bg-red-50 border border-red-200 rounded-xl text-red-700 text-sm">
          {{ error }}
        </div>
      }

      <form (ngSubmit)="onSubmit()" #f="ngForm" class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1" for="username">
            Identifiant
          </label>
          <input
            id="username"
            type="text"
            [(ngModel)]="username"
            name="username"
            autocomplete="username"
            required
            class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition"
            placeholder="admin"
          />
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1" for="password">
            Mot de passe
          </label>
          <input
            id="password"
            type="password"
            [(ngModel)]="password"
            name="password"
            autocomplete="current-password"
            required
            class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition"
            placeholder="••••••••"
          />
        </div>

        <button
          type="submit"
          [disabled]="loading"
          class="w-full py-3 bg-blue-800 text-white font-semibold rounded-xl hover:bg-blue-900 transition disabled:opacity-60 disabled:cursor-not-allowed flex items-center justify-center gap-2"
        >
          @if (loading) {
            <svg class="animate-spin w-4 h-4" fill="none" viewBox="0 0 24 24">
              <circle
                class="opacity-25"
                cx="12"
                cy="12"
                r="10"
                stroke="currentColor"
                stroke-width="4"
              ></circle>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"></path>
            </svg>
          }
          {{ loading ? 'Connexion...' : 'Se connecter' }}
        </button>
      </form>
    </div>

    <p class="text-center text-blue-300 text-xs mt-6">
      <a routerLink="/" class="hover:text-white transition">← Retour au site public</a>
    </p>
  </div>
</div>
